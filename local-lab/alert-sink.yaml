# Webhook receiver local để CHỨNG MINH Alertmanager gửi cảnh báo tới nơi thật.
# Ở production thay bằng Slack/PagerDuty (xem local-lab/README + docs/12-slo-sla.md).
# mendhak/http-https-echo log toàn bộ request (kể cả body JSON) ra stdout.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-sink
  namespace: monitoring
  labels: { app: alert-sink }
spec:
  replicas: 1
  selector:
    matchLabels: { app: alert-sink }
  template:
    metadata:
      labels: { app: alert-sink }
    spec:
      containers:
        - name: echo
          image: mendhak/http-https-echo:31
          env:
            - { name: HTTP_PORT, value: "8080" }
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: alert-sink
  namespace: monitoring
spec:
  selector: { app: alert-sink }
  ports: [{ port: 8080, targetPort: 8080 }]
