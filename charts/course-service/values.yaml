replicaCount: 2
image:
  repository: "500519358149.dkr.ecr.ap-southeast-1.amazonaws.com/eduvn/course-service"
  tag: "sha-52475b9"
  pullPolicy: IfNotPresent
# IRSA: gắn IAM role cho ServiceAccount (điền ARN từ terraform output course_service_irsa)
serviceAccount:
  create: true
  name: course-service
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::500519358149:role/eduvn-dev-course-service"
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
# Ingress qua AWS Load Balancer Controller (tạo ALB)
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Không set certificate-arn: LB Controller tự tìm ACM cert khớp host bên dưới.
  host: api.mywebsitelocle.click
  path: /
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
env:
  - name: TABLE_NAME
    value: "eduvn-dev-courses"
  - name: AWS_REGION
    value: "ap-southeast-1"
# --- Hardening (mandate solutions) ---

# Mandate #5: chạy non-root, drop capabilities, rootfs read-only.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop: ["ALL"]
# Mandate #3: rollout zero-downtime + drain.
terminationGracePeriodSeconds: 30
rollout:
  maxUnavailable: 0
  maxSurge: 1
  minReadySeconds: 10
  preStopSleep: 5
# Mandate #3: giữ ≥1 pod khi drain node.
podDisruptionBudget:
  enabled: true
  minAvailable: 1
# Mandate #3: trải pod ra nhiều zone.
topologySpread:
  enabled: true
# Mandate #1: chặn traffic ngoài allowlist. ingressCIDRs = CIDR subnet nơi ALB đặt ENI.
networkPolicy:
  enabled: true
  ingressCIDRs:
    - 10.0.0.0/16 # VPC CIDR (khớp infra/variables.tf vpc_cidr)
