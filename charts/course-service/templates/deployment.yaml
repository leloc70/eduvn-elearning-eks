apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "course-service.name" . }}
  labels:
    {{- include "course-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # Rollout zero-downtime (Mandate #3): không hạ pod cũ trước khi pod mới Ready.
  minReadySeconds: {{ .Values.rollout.minReadySeconds }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollout.maxUnavailable }}
      maxSurge: {{ .Values.rollout.maxSurge }}
  selector:
    matchLabels:
      {{- include "course-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "course-service.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      # Mandate #17: không mount K8s API token (app chỉ cần AWS qua IRSA, không gọi K8s API).
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      # Chạy non-root (Mandate #5)
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.topologySpread.enabled }}
      # Trải pod ra nhiều zone -> mất 1 zone/node không rớt cả service (Mandate #3)
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "course-service.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: {{ include "course-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Chờ drain kết nối trước khi pod bị xoá (Mandate #3)
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.rollout.preStopSleep }}"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          # /tmp ghi được vì rootfs read-only (Mandate #5)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
