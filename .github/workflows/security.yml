name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1" # 09:00 giờ VN thứ Hai hàng tuần

permissions:
  contents: read

jobs:
  deps-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/course-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/course-service/package-lock.json
      - run: npm ci
      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high

  trivy-fs:
    name: Trivy — deps & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

  iac-scan:
    name: Checkov — Terraform IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true
          # soft_fail: true  # bật nếu chưa muốn chặn PR khi có finding
