name: CD — build, push & bump manifest

# Chạy khi code service hoặc chart thay đổi trên main.
# Build image -> push ECR -> cập nhật image tag trong Git -> ArgoCD tự deploy.
on:
  workflow_dispatch: {} # cho phép deploy thủ công (gh workflow run cd.yml)
  push:
    branches: [main]
    paths:
      # Chỉ build khi code service đổi. KHÔNG gồm charts/ để manifest bump
      # (output của chính CD) không tự trigger lại -> tránh vòng lặp.
      - "services/course-service/**"
      - ".github/workflows/cd.yml"

# OIDC: id-token để assume IAM role; contents:write để commit bump tag.
permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: cd-course-service
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPO: eduvn/course-service

jobs:
  build-push:
    name: Build & push image, bump manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Cần token push lại commit bump tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: services/course-service
          push: true
          # Chỉ tag sha (ECR để IMMUTABLE nên không push lại 'latest' được)
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.tag }}

      - name: Bump image in Helm values
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          yq -i '.image.repository = strenv(REGISTRY) + "/" + strenv(ECR_REPO)' charts/course-service/values.yaml
          yq -i '.image.tag = strenv(TAG)' charts/course-service/values.yaml

      # Mở PR bump (không push thẳng main — ruleset chặn). PR tự merge khi CI xanh.
      - name: Open auto-merge PR to bump image
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git diff --quiet; then
            echo "Manifest không đổi — bỏ qua."; exit 0
          fi
          BRANCH="ci/bump-course-service-${TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add charts/course-service/values.yaml
          git commit -m "ci: bump course-service image to ${TAG}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "ci: bump course-service image to ${TAG}" \
            --body "Automated image bump by CD. ArgoCD sẽ sync sau khi merge."
          gh pr merge "$BRANCH" --squash --auto --delete-branch
      # PR merge (charts/) không trigger lại CD (paths chỉ gồm services/) -> không loop.
      # ArgoCD phát hiện values.yaml đổi và tự sync.
