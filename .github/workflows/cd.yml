name: CD — build, sign, push & bump manifest

# Mandate #10: build có scope theo service, ký image (cosign keyless) + SBOM/provenance,
# action pin theo commit SHA (không tag trôi).
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "services/course-service/**"
      - ".github/workflows/cd.yml"

permissions:
  id-token: write # OIDC (assume role + cosign keyless)
  contents: write
  pull-requests: write

concurrency:
  group: cd-course-service
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPO: eduvn/course-service

jobs:
  build-push:
    name: Build, sign & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push (+ SBOM + provenance)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: services/course-service
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.tag }}
          sbom: true
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless, OIDC)
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # Mở PR bump (không push thẳng main — ruleset chặn). Merge tay vì PR do
      # GITHUB_TOKEN tạo không trigger required checks (xem docs/INCIDENTS #5).
      - name: Open PR to bump image
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git diff --quiet; then echo "Manifest không đổi"; exit 0; fi
          BRANCH="ci/bump-course-service-${TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add charts/course-service/values.yaml
          git commit -m "ci: bump course-service image to ${TAG}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "ci: bump course-service image to ${TAG}" \
            --body "Automated image bump (đã ký cosign). Cần merge tay hoặc bởi maintainer."
