name: Deploy Web (frontend → S3 + CloudFront)

# Tự deploy frontend khi đổi code — chạy trên runner GitHub (có aws CLI riêng),
# không phụ thuộc máy local. Cần: vars AWS_WEB_ROLE_ARN, AWS_WEB_BUCKET, AWS_CF_DIST_ID.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_WEB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 + invalidate CloudFront
        env:
          BUCKET: ${{ vars.AWS_WEB_BUCKET }}
          DIST: ${{ vars.AWS_CF_DIST_ID }}
        run: |
          aws s3 sync frontend/dist "s3://$BUCKET" --delete \
            --cache-control "public,max-age=31536000,immutable" --exclude "index.html"
          aws s3 cp frontend/dist/index.html "s3://$BUCKET/index.html" --cache-control "no-cache"
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"
