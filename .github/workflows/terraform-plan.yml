name: Terraform Plan

# Chạy plan trên PR đụng vào infra/ và comment kết quả vào PR.
on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write        # OIDC assume role
  contents: read
  pull-requests: write   # comment plan vào PR

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  plan:
    name: Plan & comment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Format check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Init
        id: init
        run: terraform init

      - name: Validate
        id: validate
        run: terraform validate -no-color

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan > plan_raw.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          # Cắt bớt để vừa giới hạn comment của GitHub (~65k ký tự)
          head -c 60000 plan_raw.txt > plan.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const marker = '<!-- terraform-plan -->';
            const body = `${marker}
### 🏗️ Terraform Plan
| Bước | Kết quả |
|---|---|
| Format | \`${{ steps.fmt.outcome }}\` |
| Init | \`${{ steps.init.outcome }}\` |
| Validate | \`${{ steps.validate.outcome }}\` |
| Plan | \`${{ steps.plan.outputs.exitcode == '0' && 'success' || 'review' }}\` |

<details><summary>Xem plan output</summary>

\`\`\`
${plan}
\`\`\`
</details>

*Bởi \`${{ github.workflow }}\` cho commit ${{ github.event.pull_request.head.sha }}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "Terraform plan failed — xem comment PR."
          exit 1
