name: CI

# Chạy khi mở Pull Request -> kiểm tra chất lượng trước khi merge.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  service:
    name: Course service — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/course-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/course-service/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Syntax check
        run: node --check src/index.js && node --check src/db.js

      - name: Smoke test (health + CRUD)
        run: |
          node src/index.js &
          PID=$!
          sleep 2
          curl -fsS localhost:8080/healthz
          curl -fsS -X POST localhost:8080/courses \
            -H 'content-type: application/json' \
            -d '{"title":"ci-test","price":1}'
          curl -fsS localhost:8080/courses
          kill $PID

      - name: Docker build (no push)
        run: docker build -t course-service:ci .

  helm:
    name: Helm chart — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint charts/course-service

  terraform:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate
