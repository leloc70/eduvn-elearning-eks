apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # role điền từ: terraform -chdir=infra output -raw karpenter_node_role_name
  role: "NODE_ROLE_NAME"
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eduvn-dev
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eduvn-dev
